info:
  name: Get Stopplace With Topology
  type: http
  seq: 3

http:
  method: POST
  url: {{baseUrl}}/getStopplaceWithStationTopology
  body:
    type: json
    data: |-
      {"params": ["NL:S:ut"]}

docs: |-
  Returns a station with full geometry and topology data. Same as
  getStopplace but includes the station boundary polygon (geom),
  RD coordinates (geom28992), and WGS84 coordinates (geom4326).

  Parameters:
    1. stopplacecode (String) — e.g. "NL:S:ut" (Utrecht Centraal)
