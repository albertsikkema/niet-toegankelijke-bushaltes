name: Update bus stop data

on:
  schedule:
    - cron: '0 6 * * *' # Daily at 06:00 UTC (07:00/08:00 NL time)
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: node pipeline/fetch-data.js

      - name: Validate pipeline output
        run: node pipeline/validate-data.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --staged --quiet && exit 0
          git commit -m "chore: update bus stop data ($(date -u +%Y-%m-%d))"
          git push
