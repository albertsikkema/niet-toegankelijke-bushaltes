      {"params": [[540000, 6865000, 550000, 6875000]]}

docs: |-
  Returns all stopplaces within a geographic bounding box.

  Parameters:
    1. extent (double[]) — [minX, minY, maxX, maxY] in EPSG:3857.
       The example covers the Amsterdam area.
